# PSE2025 bundle — run base/low/high together (overlay inputs gitignored)

base:
  name: pse2025
  description: "PSE2025 (Scott 2017 JG layer) — run base/low/high"
  fp_home: FM
  input_overlay_dir: projects_local/pse2025
  backend: fpexe
  forecast_start: "2025.4"
  forecast_end: "2029.4"
  input_file: psebase.txt
  track_variables:
    - GDPR
    - GDP
    - PCPF
    - PIEF
    - SG
    - RS
    - UR
    - E
    - JGJ
    - JF
    - WF
    - PF

variants:
  - name: base
    patch:
      input_file: psebase.txt
  - name: low
    patch:
      input_file: pselow.txt
  - name: high
    patch:
      input_file: psehigh.txt

focus_variables:
  - GDPR
  - UR
  - PCPF
  - SG
  - RS

