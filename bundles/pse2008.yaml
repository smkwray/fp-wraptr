# PSE2008 bundle — historical counterfactual run for base/low/high

base:
  name: pse2008
  description: "PSE2008 historical counterfactual (Scott 2017 JG layer) — run base/low/high"
  fp_home: FM
  input_overlay_dir: projects_local/pse2008
  backend: fpexe
  forecast_start: "2008.4"
  forecast_end: "2012.4"
  input_file: psebase.txt
  track_variables:
    - GDPR
    - GDP
    - PCPF
    - PIEF
    - SG
    - RS
    - UR
    - E
    - JGJ
    - JF
    - WF
    - PF

variants:
  - name: base
    patch:
      input_file: psebase.txt
  - name: low
    patch:
      input_file: pselow.txt
  - name: high
    patch:
      input_file: psehigh.txt

focus_variables:
  - GDPR
  - UR
  - PCPF
  - SG
  - RS
