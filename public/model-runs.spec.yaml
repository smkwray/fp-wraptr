version: 1
title: FP Model Runs Explorer
site_subpath: model-runs
runs:
  - run_id: stock_fm_baseline
    label: Stock FM Baseline
    scenario_name: stock_fm_baseline
    summary: ""
    details:
      - Forecast 2025.4 to 2029.4 using the stock FM input deck.
  - run_id: low_15h
    label: PSE2025 $15/h Low
    scenario_name: low_15h
    summary: Job Guarantee on with low take-up and a flat $15/hour wage.
    details:
      - JGSWITCH=1, JGHILO=0.
      - UBGH=0.5, so UBSH=0.5.
      - JGPHASE ramps 0.2, 0.4, 0.6, 0.8, then 1.0.
      - JGW is fixed at 0.015 ($15/hour) and JGCOLA stays 0.
      - INTGADJ=0.20225158129.
      - 'JGPTJ1 coeffs: JPTUR=0.438306, JPTYD=-0.004794, JPTJD=0.000216.'
      - 'JGCHLDU1 coeffs: JCHC0=-0.0001204075, JCHUR=0.03856602, JCHJH=0.00004307053, JCHYP=0.00246758.'
      - 'JGWAJHIL coeffs: JHIA0=0.198907, JHILF=-0.130271, JHIYP=-0.002693, JHIJH=-0.000166.'
      - 'JGWAJLOL coeffs: JLOA0=0.189759, JLOLF=-0.132137, JLOYP=-0.002507, JLOJH=-0.000146.'
      - 'JGULLL1 coeffs: JULUR=0.856919, JULJH=-0.000121; JGUUWKL1 coeffs: JUWUR=0.81760, JUWJH=-0.000159.'
  - run_id: high_15h
    label: PSE2025 $15/h High
    scenario_name: high_15h
    summary: Job Guarantee on with high take-up and a flat $15/hour wage.
    details:
      - JGSWITCH=1, JGHILO=1.
      - UBGH=0.5, so UBSH=0.5.
      - JGPHASE ramps 0.2, 0.4, 0.6, 0.8, then 1.0.
      - JGW is fixed at 0.015 ($15/hour) and JGCOLA stays 0.
      - INTGADJ=0.20225158129.
      - 'JGPTJ1 coeffs: JPTUR=0.438306, JPTYD=-0.004794, JPTJD=0.000216.'
      - 'JGCHLDU1 coeffs: JCHC0=-0.0001204075, JCHUR=0.03856602, JCHJH=0.00004307053, JCHYP=0.00246758.'
      - 'JGWAJHIL coeffs: JHIA0=0.198907, JHILF=-0.130271, JHIYP=-0.002693, JHIJH=-0.000166.'
      - 'JGWAJLOL coeffs: JLOA0=0.189759, JLOLF=-0.132137, JLOYP=-0.002507, JLOJH=-0.000146.'
      - 'JGULLL1 coeffs: JULUR=0.856919, JULJH=-0.000121; JGUUWKL1 coeffs: JUWUR=0.81760, JUWJH=-0.000159.'
  - run_id: pse2025_base
    label: PSE2025 Base
    scenario_name: pse2025_base
    summary: Baseline with the Job Guarantee switched off.
    details:
      - JGSWITCH=0, JGPHASE=0, JGHILO=0.
      - UBGH=1, so UBSH=0.
      - JGCOLA=0.
      - INTGADJ=0.20225158129.
      - 'JGPTJ1 coeffs: JPTUR=0.438306, JPTYD=-0.004794, JPTJD=0.000216.'
      - 'JGCHLDU1 coeffs: JCHC0=-0.0001204075, JCHUR=0.03856602, JCHJH=0.00004307053, JCHYP=0.00246758.'
      - 'JGWAJHIL coeffs: JHIA0=0.198907, JHILF=-0.130271, JHIYP=-0.002693, JHIJH=-0.000166.'
      - 'JGWAJLOL coeffs: JLOA0=0.189759, JLOLF=-0.132137, JLOYP=-0.002507, JLOJH=-0.000146.'
      - 'JGULLL1 coeffs: JULUR=0.856919, JULJH=-0.000121; JGUUWKL1 coeffs: JUWUR=0.81760, JUWJH=-0.000159.'
  - run_id: pse2025_high
    label: PSE2025 High $25/h
    scenario_name: pse2025_high
    summary: Job Guarantee on with high take-up and a wage ramp from $20/hour to $25/hour.
    details:
      - JGSWITCH=1, JGHILO=1.
      - UBGH=0.5, so UBSH=0.5.
      - JGPHASE ramps 0.2, 0.4, 0.6, 0.8, then 1.0.
      - JGW starts at 0.020 and JGCOLA is 0.05737126344 for 2026.1-2026.4, then 0 afterward.
      - INTGADJ=0.20225158129.
      - 'JGPTJ1 coeffs: JPTUR=0.438306, JPTYD=-0.004794, JPTJD=0.000216.'
      - 'JGCHLDU1 coeffs: JCHC0=-0.0001204075, JCHUR=0.03856602, JCHJH=0.00004307053, JCHYP=0.00246758.'
      - 'JGWAJHIL coeffs: JHIA0=0.198907, JHILF=-0.130271, JHIYP=-0.002693, JHIJH=-0.000166.'
      - 'JGWAJLOL coeffs: JLOA0=0.189759, JLOLF=-0.132137, JLOYP=-0.002507, JLOJH=-0.000146.'
      - 'JGULLL1 coeffs: JULUR=0.856919, JULJH=-0.000121; JGUUWKL1 coeffs: JUWUR=0.81760, JUWJH=-0.000159.'
  - run_id: pse2025_low
    label: PSE2025 Low $25/h
    scenario_name: pse2025_low
    summary: Job Guarantee on with low take-up and a wage ramp from $20/hour to $25/hour.
    details:
      - JGSWITCH=1, JGHILO=0.
      - UBGH=0.5, so UBSH=0.5.
      - JGPHASE ramps 0.2, 0.4, 0.6, 0.8, then 1.0.
      - JGW starts at 0.020 and JGCOLA is 0.05737126344 for 2026.1-2026.4, then 0 afterward.
      - INTGADJ=0.20225158129.
      - 'JGPTJ1 coeffs: JPTUR=0.438306, JPTYD=-0.004794, JPTJD=0.000216.'
      - 'JGCHLDU1 coeffs: JCHC0=-0.0001204075, JCHUR=0.03856602, JCHJH=0.00004307053, JCHYP=0.00246758.'
      - 'JGWAJHIL coeffs: JHIA0=0.198907, JHILF=-0.130271, JHIYP=-0.002693, JHIJH=-0.000166.'
      - 'JGWAJLOL coeffs: JLOA0=0.189759, JLOLF=-0.132137, JLOYP=-0.002507, JLOJH=-0.000146.'
      - 'JGULLL1 coeffs: JULUR=0.856919, JULJH=-0.000121; JGUUWKL1 coeffs: JUWUR=0.81760, JUWJH=-0.000159.'
default_run_ids:
  - pse2025_base
  - pse2025_high
  - pse2025_low
presets:
  - id: pse-economy
    label: Economy
    variables:
      - GDPR
      - GDP
      - PCPF
      - PIEF
      - SG
      - RS
  - id: pse-employment-wages
    label: PSE Employment
    variables:
      - UR
      - E
      - JGJ
      - JF
      - WF
      - WR
  - id: households-demand
    label: Households & Demand
    variables:
      - YD
      - C
      - CN
      - CS
      - CD
      - AH
default_preset_ids:
  - pse-economy
