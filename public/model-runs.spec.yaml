version: 1
title: FP-Wraptr Runs Explorer
site_subpath: model-runs
runs:
- run_id: stock_fm_baseline
  label: Stock FM 2/2026
  group: Reference
  family_id: stock_fm_baseline
  horizon_id: 5y
  horizon_label: 5Y
  horizon_years: 5
  scenario_name: stock_fm_baseline
  summary: Stock model reference run.
  details:
  - Forecast 2025.4 to 2029.4 using the stock FM input deck.
- run_id: pse2025_base
  label: PSE2026.2 Base
  group: Standard 2026
  family_id: pse2025_base
  horizon_id: 5y
  horizon_label: 5Y
  horizon_years: 5
  scenario_name: pse2025_base
  summary: Baseline with the Job Guarantee switched off.
  details:
  - JGSWITCH=0, JGPHASE=0, and JGHILO=0.
  - UBGH=0.5 for consistency with the replacement family.
- run_id: pse2025_base_10y
  label: PSE2026.2 Base
  group: Standard 2026
  family_id: pse2025_base
  horizon_id: 10y
  horizon_label: 10Y
  horizon_years: 10
  scenario_name: pse2025_base_10y
  summary: Baseline with the Job Guarantee switched off.
  details:
  - Exact 10-year extension of the published 5-year base run.
  - The first 2025.4 to 2029.4 path matches the 5-year public run exactly.
- run_id: pse2025_high_20h_3pct
  label: PSE2026.2 High $20/h 3%
  group: Standard 2026
  family_id: pse2025_high_20h_3pct
  horizon_id: 5y
  horizon_label: 5Y
  horizon_years: 5
  scenario_name: pse2025_high_20h_3pct
  summary: High take-up with a $20/hour start and 3% annual wage growth.
  details:
  - JGSWITCH=1, JGHILO=1, and UBGH=0.5.
  - JGPHASE keeps the standard 5-step ramp.
  - JGW starts at 0.020 and JGCOLA applies 3% annualized growth from 2026.1 onward.
