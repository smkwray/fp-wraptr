- run_id: pse2005_base_backcast
  label: PSE2005 Base Backcast
  group: 2005 Backcast
  scenario_name: pse2005_base_backcast
  summary: Backcast baseline from 2005 with the Job Guarantee switched off.
  details:
  - Forecast 2005.1 to 2015.4 via fppy.
  - JGSWITCH=0, JGPHASE=0, JGHILO=0, and UBGH=0.5.
  - Residual replay keeps the observed business-cycle/error structure in the 2005.1-2015.4 window.
- run_id: pse2005_low_20h_backcast_3pct
  label: PSE2005 JG Low Backcast
  group: 2005 Backcast
  scenario_name: pse2005_low_20h_backcast_3pct
  summary: Low take-up backcast from 2005 with a historically plausible JG wage path growing at 3% per year.
  details:
  - Forecast 2005.1 to 2015.4 via fppy.
  - JGPHASE ramps over eight quarters from 2005.1 through 2006.4.
  - JGW starts near $11.07/hour in 2005 and grows at 3% annualized inside the 2005.1-2015.4 comparison window.
  - Residual replay keeps the observed business-cycle/error structure in the 2005.1-2015.4 window.
