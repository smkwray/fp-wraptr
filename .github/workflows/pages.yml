name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - name: Provision model-runs payloads
        env:
          MODEL_RUNS_SOURCE_DIR: ${{ vars.MODEL_RUNS_SOURCE_DIR }}
          MODEL_RUNS_ARCHIVE_URL: ${{ secrets.MODEL_RUNS_ARCHIVE_URL }}
          MODEL_RUNS_BEARER_TOKEN: ${{ secrets.MODEL_RUNS_BEARER_TOKEN }}
          MODEL_RUNS_ARCHIVE_SHA256: ${{ vars.MODEL_RUNS_ARCHIVE_SHA256 }}
          MODEL_RUNS_ARCHIVE_TYPE: ${{ vars.MODEL_RUNS_ARCHIVE_TYPE }}
          MODEL_RUNS_BASE_URL: ${{ vars.MODEL_RUNS_BASE_URL }}
        run: bash scripts/ci/provision_model_runs.sh
      - run: uv sync --extra docs
      - run: uv run mkdocs build --strict
      - run: test -f public/model-runs/manifest.json
      - run: test -f public/model-runs/runs/pse2025_base.json
      - run: mkdir -p site/model-runs
      - run: cp -R public/model-runs/. site/model-runs/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
