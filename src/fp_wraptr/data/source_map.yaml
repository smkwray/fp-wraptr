# NOTE: D1G is used in policy DSL and model equations as an effective tax-rate parameter.
# It must not be updated from raw BEA line items (which are dollar flows) without an explicit
# derived-rate computation (e.g., receipts / taxable income). We intentionally leave it
# unmapped for now to prevent catastrophic scale errors in updated bundles.

