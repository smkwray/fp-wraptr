# FP Model Data Source Map
#
# Maps FP model variables to their real-world data sources for the
# data update pipeline. Each entry specifies where to fetch fresh
# observations so fmdata.txt can be regenerated independently of
# the Yale FP website.
#
# Sources:
#   fred   — FRED (Federal Reserve Economic Data), via fredapi
#   bea    — BEA/NIPA tables, via BEA REST API
#   bls    — Bureau of Labor Statistics, via BLS Public Data API
#   census — Census Bureau
#   treas  — US Treasury
#
# Frequency: Q = quarterly, M = monthly (aggregated to Q), A = annual
# Transform: level, growth_rate, index, cumulative
# Units follow FP model convention (billions SAAR, percent, index)
#
# This file is the authoritative reference for the data pipeline.
# When Table A.5 from the dictionary (pabapa.pdf) is parsed, entries
# here should be cross-referenced and expanded.
#
# STATUS: Expanded baseline — 60+ variables mapped, including full coverage
# of variables currently carrying dictionary raw-data links. Continue curation
# by filling concrete series/table locators for placeholder entries.

