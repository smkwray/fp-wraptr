# PSE2025 parity trace (single quarter) for fp.exe vs fp-py.
#
# Note: Requires Wine on macOS for fp.exe execution.

name: pse2025_base_parity_trace_quick
description: "PSE2025 base parity trace (gate at forecast boundary 2025.4)"
fp_home: ../FM
input_overlay_dir: ../projects_local/pse2025
input_file: psebase.txt
forecast_start: "2025.4"
forecast_end: "2029.4"
backend: fpexe
fppy:
  eq_flags_preset: parity
  eq_iter_trace: true
  eq_iter_trace_period: "2025.4"
  eq_iter_trace_targets: "PIEF,CCH,RNT,GSB,GSNN,CCS,CCG,XX,IVF,PIV,PF,PCPF"
  eq_iter_trace_max_events: 2000
track_variables:
  - PIEF
  - CCH
  - RNT
  - GSB
  - GSNN
  - CCS
  - CCG
  - XX
  - IVF
  - PIV
  - PF
  - PCPF
  - JGJ
  - E
  - JF
  - RS
