# Baseline parity smoke scenario (short horizon).
#
# Purpose: keep CI/Tandy “smoke parity” runs fast and less prone to Wine timeouts,
# while still exercising the full fp.exe vs fppy parity pipeline.

name: baseline_smoke
description: "Baseline parity smoke (single-quarter horizon)"
fp_home: ../FM
input_file: fminput.txt
forecast_start: "2025.4"
forecast_end: "2025.4"
fppy:
  eq_flags_preset: parity
  timeout_seconds: 900
input_patches:
  # Shrink the solve window so smoke runs are fast (reduce SMPL solve horizon).
  # This replaces both occurrences in the stock FM/fminput.txt.
  "SMPL 2025.4 2029.4;": "SMPL 2025.4 2025.4;"
track_variables:
  - PCY
  - PCPF
  - UR
  - PIEF
  - GDPR
